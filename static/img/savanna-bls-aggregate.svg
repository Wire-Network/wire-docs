<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <style>
      /* Dark mode (default) */
      .bg { fill: #1a1d23; }
      .text-light { fill: #e0e0e0; font-family: 'JetBrains Mono', monospace; }
      .text-green { fill: #4ade80; font-family: 'JetBrains Mono', monospace; }
      .text-red { fill: #f87171; font-family: 'JetBrains Mono', monospace; }
      .text-cyan { fill: #67e8f9; font-family: 'JetBrains Mono', monospace; }
      .box-cyan { fill: none; stroke: #67e8f9; stroke-width: 2; rx: 4; }
      .box-green { fill: #166534; stroke: #4ade80; stroke-width: 2; rx: 4; }
      .box-red { fill: #7f1d1d; stroke: #f87171; stroke-width: 2; rx: 4; }
      .box-green-small { fill: #166534; stroke: #4ade80; stroke-width: 2; rx: 4; }
      .arrow { fill: none; stroke: #4ade80; stroke-width: 2; }
      .arrow-head { fill: #4ade80; }
      .caption { fill: #9ca3af; font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; }

      /* Light mode */
      @media (prefers-color-scheme: light) {
        .bg { fill: #f6f8fa; }
        .text-light { fill: #1a1d23; }
        .text-green { fill: #16a34a; }
        .text-red { fill: #dc2626; }
        .text-cyan { fill: #0891b2; }
        .box-cyan { fill: none; stroke: #0891b2; }
        .box-green { fill: #dcfce7; stroke: #16a34a; }
        .box-red { fill: #fee2e2; stroke: #dc2626; }
        .box-green-small { fill: #dcfce7; stroke: #16a34a; }
        .arrow { stroke: #16a34a; }
        .arrow-head { fill: #16a34a; }
        .caption { fill: #6b7280; }
      }
    </style>
  </defs>

  <rect class="bg" width="900" height="380"/>

  <!-- Title: Individual votes -->
  <text x="50" y="50" class="text-light" font-size="16">Individual votes (15 × 96B)</text>

  <!-- Signature boxes -->
  <rect x="50" y="70" width="80" height="35" class="box-cyan"/>
  <text x="90" y="93" class="text-cyan" font-size="14" text-anchor="middle">sig₁</text>

  <rect x="145" y="70" width="80" height="35" class="box-cyan"/>
  <text x="185" y="93" class="text-cyan" font-size="14" text-anchor="middle">sig₂</text>

  <rect x="240" y="70" width="80" height="35" class="box-cyan"/>
  <text x="280" y="93" class="text-cyan" font-size="14" text-anchor="middle">sig₃</text>

  <text x="345" y="93" class="text-light" font-size="16">...</text>

  <rect x="380" y="70" width="80" height="35" class="box-cyan"/>
  <text x="420" y="93" class="text-cyan" font-size="14" text-anchor="middle">sig₁₅</text>

  <!-- Arrow -->
  <line x1="480" y1="87" x2="580" y2="87" class="arrow"/>
  <polygon points="580,82 595,87 580,92" class="arrow-head"/>
  <text x="530" y="75" class="text-green" font-size="12" text-anchor="middle">BLS</text>
  <text x="530" y="110" class="text-green" font-size="12" text-anchor="middle">aggregate</text>

  <!-- QC Result box -->
  <rect x="610" y="62" width="240" height="50" class="box-green"/>
  <text x="730" y="93" class="text-green" font-size="14" text-anchor="middle">QC: σ_agg (96B) + bitmask</text>

  <!-- Payload Size Comparison -->
  <text x="50" y="170" class="text-light" font-size="16">Payload Size Comparison</text>

  <!-- ECDSA bar -->
  <rect x="50" y="190" width="600" height="40" class="box-red"/>
  <text x="350" y="217" class="text-red" font-size="14" text-anchor="middle">15 ECDSA signatures: 960 bytes</text>

  <!-- BLS bar -->
  <rect x="50" y="250" width="60" height="40" class="box-green-small"/>
  <text x="300" y="277" class="text-green" font-size="14">BLS aggregate QC: ~100 bytes (10× smaller)</text>

  <!-- Verification note -->
  <text x="50" y="330" class="text-light" font-size="14" font-style="italic">Verification: 1.1ms for BLS aggregate vs ~1.5ms for 15 ECDSA checks</text>

  <!-- Caption -->
  <text x="450" y="365" class="caption" font-size="12" text-anchor="middle">FIGURE 3 — BLS AGGREGATE SIGNATURE EFFICIENCY FOR QUORUM CERTIFICATES</text>
</svg>