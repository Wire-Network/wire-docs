<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 420">
  <defs>
    <style>
      /* Dark mode (default) */
      .bg { fill: #1a1d23; }
      .text-light { fill: #e0e0e0; font-family: 'JetBrains Mono', monospace; }
      .text-green { fill: #4ade80; font-family: 'JetBrains Mono', monospace; }
      .text-cyan { fill: #67e8f9; font-family: 'JetBrains Mono', monospace; }
      .text-purple { fill: #c084fc; font-family: 'JetBrains Mono', monospace; }
      .text-yellow { fill: #fbbf24; font-family: 'JetBrains Mono', monospace; }
      .box-source { fill: #164e63; stroke: #67e8f9; stroke-width: 2; rx: 8; }
      .box-dest { fill: #3b0764; stroke: #c084fc; stroke-width: 2; rx: 8; }
      .box-proof { fill: #14532d; stroke: #4ade80; stroke-width: 2; rx: 6; }
      .box-verifier { fill: #854d0e; stroke: #fbbf24; stroke-width: 2; rx: 6; }
      .box-inner { fill: #1e3a5f; stroke: #67e8f9; }
      .box-inner-purple { fill: #581c87; stroke: #c084fc; }
      .arrow { fill: none; stroke: #9ca3af; stroke-width: 2; }
      .arrow-green { fill: none; stroke: #4ade80; stroke-width: 2; }
      .arrow-yellow { fill: none; stroke: #fbbf24; stroke-width: 2; stroke-dasharray: 5,5; }
      .arrow-head { fill: #9ca3af; }
      .arrow-head-green { fill: #4ade80; }
      .arrow-head-yellow { fill: #fbbf24; }
      .caption { fill: #9ca3af; font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; }

      /* Light mode */
      @media (prefers-color-scheme: light) {
        .bg { fill: #f6f8fa; }
        .text-light { fill: #1a1d23; }
        .text-green { fill: #16a34a; }
        .text-cyan { fill: #0891b2; }
        .text-purple { fill: #9333ea; }
        .text-yellow { fill: #ca8a04; }
        .box-source { fill: #e0f2fe; stroke: #0891b2; }
        .box-dest { fill: #f3e8ff; stroke: #9333ea; }
        .box-proof { fill: #dcfce7; stroke: #16a34a; }
        .box-verifier { fill: #fef3c7; stroke: #ca8a04; }
        .box-inner { fill: #cffafe; stroke: #0891b2; }
        .box-inner-purple { fill: #e9d5ff; stroke: #9333ea; }
        .arrow { stroke: #6b7280; }
        .arrow-green { stroke: #16a34a; }
        .arrow-yellow { stroke: #ca8a04; }
        .arrow-head { fill: #6b7280; }
        .arrow-head-green { fill: #16a34a; }
        .arrow-head-yellow { fill: #ca8a04; }
        .caption { fill: #6b7280; }
      }
    </style>
  </defs>

  <rect class="bg" width="950" height="420"/>

  <!-- Source Chain -->
  <rect x="50" y="50" width="200" height="280" class="box-source"/>
  <text x="150" y="80" class="text-cyan" font-size="16" text-anchor="middle" font-weight="bold">Source Chain</text>
  <text x="150" y="100" class="text-light" font-size="11" text-anchor="middle">(Wire / Antelope)</text>

  <!-- Action box -->
  <rect x="70" y="120" width="160" height="45" class="box-inner" rx="4"/>
  <text x="150" y="140" class="text-light" font-size="10" text-anchor="middle">Action Executed</text>
  <text x="150" y="155" class="text-cyan" font-size="9" text-anchor="middle">transfer(A → B, 100)</text>

  <!-- Block with QC -->
  <rect x="70" y="180" width="160" height="55" class="box-inner" rx="4"/>
  <text x="150" y="200" class="text-light" font-size="10" text-anchor="middle">Block Finalized</text>
  <text x="150" y="215" class="text-green" font-size="9" text-anchor="middle">Strong QC (96B BLS)</text>
  <text x="150" y="228" class="text-light" font-size="8" text-anchor="middle">~1 second</text>

  <!-- Merkle Root -->
  <rect x="70" y="250" width="160" height="45" class="box-inner" rx="4"/>
  <text x="150" y="270" class="text-light" font-size="10" text-anchor="middle">Finality Digest</text>
  <text x="150" y="285" class="text-cyan" font-size="9" text-anchor="middle">reversible_blocks_root</text>

  <!-- Proof Generation -->
  <rect x="310" y="130" width="180" height="140" class="box-proof"/>
  <text x="400" y="160" class="text-green" font-size="14" text-anchor="middle" font-weight="bold">Finality Proof</text>

  <text x="325" y="190" class="text-light" font-size="10">1. Aggregate BLS QC</text>
  <text x="325" y="210" class="text-light" font-size="10">2. Merkle inclusion path</text>
  <text x="325" y="230" class="text-light" font-size="10">3. Action Merkle proof</text>
  <text x="325" y="250" class="text-light" font-size="10">4. Block references</text>

  <!-- Arrow from source to proof -->
  <line x1="250" y1="200" x2="305" y2="200" class="arrow-green"/>
  <polygon points="305,195 320,200 305,205" class="arrow-head-green"/>

  <!-- Destination Chain -->
  <rect x="700" y="50" width="200" height="280" class="box-dest"/>
  <text x="800" y="80" class="text-purple" font-size="16" text-anchor="middle" font-weight="bold">Destination Chain</text>
  <text x="800" y="100" class="text-light" font-size="11" text-anchor="middle">(Any chain)</text>

  <!-- Verifier Contract -->
  <rect x="720" y="130" width="160" height="80" class="box-verifier"/>
  <text x="800" y="160" class="text-yellow" font-size="12" text-anchor="middle" font-weight="bold">Verifier Contract</text>
  <text x="800" y="180" class="text-light" font-size="9" text-anchor="middle">BLS12-381 verify</text>
  <text x="800" y="195" class="text-light" font-size="9" text-anchor="middle">~1.1ms verification</text>

  <!-- Arrow from proof to verifier -->
  <line x1="490" y1="200" x2="715" y2="170" class="arrow"/>
  <polygon points="710,162 725,168 712,175" class="arrow-head"/>
  <text x="600" y="170" class="text-light" font-size="10" text-anchor="middle">Submit proof</text>

  <!-- Verification result -->
  <rect x="720" y="230" width="160" height="55" fill="#3b0764" stroke="#c084fc" rx="4"/>
  <text x="800" y="255" class="text-green" font-size="11" text-anchor="middle" font-weight="bold">Proof Valid</text>
  <text x="800" y="272" class="text-light" font-size="9" text-anchor="middle">Execute bridge action</text>

  <!-- Arrow from verifier to result -->
  <line x1="800" y1="210" x2="800" y2="225" class="arrow-green"/>
  <polygon points="795,225 800,240 805,225" class="arrow-head-green"/>

  <!-- Benefits section -->
  <text x="400" y="320" class="text-light" font-size="12" text-anchor="middle" font-weight="bold">Trust-Minimized IBC Benefits</text>

  <text x="150" y="350" class="text-green" font-size="10" text-anchor="middle">1-second finality</text>
  <text x="400" y="350" class="text-green" font-size="10" text-anchor="middle">O(1) proof size</text>
  <text x="650" y="350" class="text-green" font-size="10" text-anchor="middle">Cryptographic verification</text>

  <text x="150" y="370" class="text-light" font-size="9" text-anchor="middle">No 3-min wait</text>
  <text x="400" y="370" class="text-light" font-size="9" text-anchor="middle">~100 bytes QC</text>
  <text x="650" y="370" class="text-light" font-size="9" text-anchor="middle">No trusted relayers</text>

  <!-- Caption -->
  <text x="475" y="405" class="caption" font-size="12" text-anchor="middle">FIGURE 8 — CONCEPTUAL IBC FLOW ENABLED BY SAVANNA FINALITY PROOFS</text>
</svg>
