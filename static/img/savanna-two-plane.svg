<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 480">
  <defs>
    <style>
      /* Dark mode (default) */
      .bg { fill: #1a1d23; }
      .text-light { fill: #e0e0e0; font-family: 'JetBrains Mono', monospace; }
      .text-cyan { fill: #67e8f9; font-family: 'JetBrains Mono', monospace; }
      .text-green { fill: #4ade80; font-family: 'JetBrains Mono', monospace; }
      .text-purple { fill: #c084fc; font-family: 'JetBrains Mono', monospace; }
      .text-yellow { fill: #fbbf24; font-family: 'JetBrains Mono', monospace; }
      .box-cyan { fill: #1e3a5f; stroke: #67e8f9; stroke-width: 2; rx: 8; }
      .box-green { fill: #14532d; stroke: #4ade80; stroke-width: 3; rx: 8; }
      .box-purple { fill: #3b0764; stroke: #c084fc; stroke-width: 2; rx: 8; }
      .box-yellow { fill: #1c1c1c; stroke: #fbbf24; stroke-width: 2; rx: 8; }
      .arrow { fill: none; stroke: #67e8f9; stroke-width: 2; }
      .arrow-green { fill: none; stroke: #4ade80; stroke-width: 2; }
      .arrow-purple { fill: none; stroke: #c084fc; stroke-width: 2; }
      .arrow-head-cyan { fill: #67e8f9; }
      .arrow-head-green { fill: #4ade80; }
      .arrow-head-purple { fill: #c084fc; }
      .caption { fill: #9ca3af; font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; }

      /* Light mode */
      @media (prefers-color-scheme: light) {
        .bg { fill: #f6f8fa; }
        .text-light { fill: #1a1d23; }
        .text-cyan { fill: #0891b2; }
        .text-green { fill: #16a34a; }
        .text-purple { fill: #9333ea; }
        .text-yellow { fill: #ca8a04; }
        .box-cyan { fill: #e0f2fe; stroke: #0891b2; }
        .box-green { fill: #dcfce7; stroke: #16a34a; }
        .box-purple { fill: #f3e8ff; stroke: #9333ea; }
        .box-yellow { fill: #fef3c7; stroke: #ca8a04; }
        .arrow { stroke: #0891b2; }
        .arrow-green { stroke: #16a34a; }
        .arrow-purple { stroke: #9333ea; }
        .arrow-head-cyan { fill: #0891b2; }
        .arrow-head-green { fill: #16a34a; }
        .arrow-head-purple { fill: #9333ea; }
        .caption { fill: #6b7280; }
      }
    </style>
  </defs>

  <rect class="bg" width="950" height="480"/>

  <!-- Block Proposer -->
  <rect x="50" y="50" width="220" height="120" class="box-cyan"/>
  <text x="160" y="85" class="text-cyan" font-size="18" text-anchor="middle" font-weight="bold">Block Proposer</text>
  <text x="160" y="110" class="text-light" font-size="11" text-anchor="middle">DPoS rotation schedule</text>
  <text x="160" y="128" class="text-light" font-size="11" text-anchor="middle">packs txns, includes QC</text>
  <text x="160" y="146" class="text-light" font-size="11" text-anchor="middle">broadcasts block</text>

  <!-- Arrow to Finalizer -->
  <line x1="270" y1="110" x2="350" y2="110" class="arrow"/>
  <polygon points="350,105 365,110 350,115" class="arrow-head-cyan"/>
  <text x="310" y="100" class="text-light" font-size="11" text-anchor="middle">block</text>

  <!-- Block Finalizer -->
  <rect x="365" y="50" width="220" height="120" class="box-green"/>
  <text x="475" y="85" class="text-green" font-size="18" text-anchor="middle" font-weight="bold">Block Finalizer</text>
  <text x="475" y="110" class="text-light" font-size="11" text-anchor="middle">BLS keypair</text>
  <text x="475" y="128" class="text-light" font-size="11" text-anchor="middle">validates block, checks rules</text>
  <text x="475" y="146" class="text-light" font-size="11" text-anchor="middle">emits signed vote</text>

  <!-- Arrow to P2P -->
  <line x1="585" y1="110" x2="665" y2="110" class="arrow-green"/>
  <polygon points="665,105 680,110 665,115" class="arrow-head-green"/>
  <text x="625" y="100" class="text-green" font-size="11" text-anchor="middle">votes</text>

  <!-- P2P/net_plugin -->
  <rect x="680" y="50" width="220" height="120" class="box-purple"/>
  <text x="790" y="85" class="text-purple" font-size="18" text-anchor="middle" font-weight="bold">P2P / net_plugin</text>
  <text x="790" y="110" class="text-light" font-size="11" text-anchor="middle">gossips votes to proposer</text>
  <text x="790" y="128" class="text-light" font-size="11" text-anchor="middle">propagates blocks &amp; QCs</text>
  <text x="790" y="146" class="text-light" font-size="11" text-anchor="middle">vote_threads pool</text>

  <!-- Return arrow -->
  <path d="M 160 170 L 160 220 L 790 220 L 790 170" class="arrow-purple" fill="none"/>
  <polygon points="155,170 160,155 165,170" class="arrow-head-purple"/>
  <text x="475" y="245" class="text-light" font-size="12" text-anchor="middle">QC aggregated → included in next block header</text>

  <!-- Block N_k -->
  <rect x="300" y="290" width="350" height="100" class="box-yellow"/>
  <text x="475" y="325" class="text-yellow" font-size="18" text-anchor="middle" font-weight="bold">Block N<tspan baseline-shift="sub" font-size="12">k</tspan></text>
  <text x="475" y="355" class="text-light" font-size="12" text-anchor="middle">header { producer, timestamp, txns_root, ... }</text>
  <text x="475" y="375" class="text-light" font-size="12" text-anchor="middle">instant_finality_extension { QC for N<tspan baseline-shift="sub" font-size="10">k-1</tspan> }</text>

  <!-- Caption -->
  <text x="475" y="450" class="caption" font-size="12" text-anchor="middle">FIGURE 4 — SAVANNA TWO-PLANE ARCHITECTURE: PROPOSERS, FINALIZERS, AND QC FLOW</text>
</svg>