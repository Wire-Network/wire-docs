<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 320" preserveAspectRatio="xMidYMid meet" style="width:100%;display:block;margin:0 auto;">
  <defs>
    <style>
      /* Dark mode (default) */
      .bg { fill: #1a1d23; }
      .text-light { fill: #e0e0e0; font-family: 'JetBrains Mono', monospace; }
      .text-green { fill: #4ade80; font-family: 'JetBrains Mono', monospace; }
      .text-orange { fill: #fb923c; font-family: 'JetBrains Mono', monospace; }
      .text-cyan { fill: #67e8f9; font-family: 'JetBrains Mono', monospace; }
      .box-cyan { fill: #164e63; stroke: #67e8f9; stroke-width: 2; rx: 8; }
      .box-green { fill: #14532d; stroke: #4ade80; stroke-width: 2; rx: 8; }
      .box-orange { fill: #7c2d12; stroke: #fb923c; stroke-width: 2; rx: 8; }
      .box-white { fill: #f5f5f5; stroke: #e0e0e0; stroke-width: 1; rx: 8; }
      .line-orange { stroke: #fb923c; stroke-width: 2; }
      .line-green { stroke: #4ade80; stroke-width: 2; }
      .caption { fill: #9ca3af; font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; }
      .text-dark { fill: #1a1d23; font-family: 'JetBrains Mono', monospace; }

      /* Light mode */
      @media (prefers-color-scheme: light) {
        .bg { fill: #f6f8fa; }
        .text-light { fill: #1a1d23; }
        .text-green { fill: #16a34a; }
        .text-orange { fill: #ea580c; }
        .text-cyan { fill: #0891b2; }
        .box-cyan { fill: #e0f2fe; stroke: #0891b2; }
        .box-green { fill: #dcfce7; stroke: #16a34a; }
        .box-orange { fill: #ffedd5; stroke: #ea580c; }
        .box-white { fill: #ffffff; stroke: #d1d5db; }
        .line-orange { stroke: #ea580c; }
        .line-green { stroke: #16a34a; }
        .caption { fill: #6b7280; }
        .text-dark { fill: #1a1d23; }
      }
    </style>
  </defs>

  <rect class="bg" width="750" height="320"/>

  <!-- Title -->
  <text x="25" y="25" class="text-light" font-size="13">Chain Fork Recovery Scenario</text>

  <!-- B5 block -->
  <rect x="25" y="75" width="60" height="50" class="box-cyan"/>
  <text x="55" y="105" class="text-cyan" font-size="13" text-anchor="middle" font-weight="bold">B₅</text>

  <!-- B6a block (strong QC) -->
  <rect x="130" y="40" width="80" height="45" class="box-green"/>
  <text x="170" y="60" class="text-green" font-size="12" text-anchor="middle" font-weight="bold">B₆a</text>
  <text x="170" y="74" class="text-light" font-size="8" text-anchor="middle">strong QC</text>

  <!-- B6b block (orphaned) -->
  <rect x="130" y="115" width="80" height="45" class="box-orange"/>
  <text x="170" y="135" class="text-orange" font-size="12" text-anchor="middle" font-weight="bold">B₆b</text>
  <text x="170" y="149" class="text-light" font-size="8" text-anchor="middle">orphaned</text>

  <!-- B7 block -->
  <rect x="255" y="55" width="60" height="40" class="box-green"/>
  <text x="285" y="80" class="text-green" font-size="12" text-anchor="middle" font-weight="bold">B₇</text>

  <!-- Lines -->
  <line x1="85" y1="90" x2="130" y2="62" class="line-green"/>
  <line x1="85" y1="110" x2="130" y2="137" class="line-orange"/>
  <line x1="210" y1="62" x2="255" y2="72" class="line-green"/>
  <line x1="210" y1="137" x2="255" y2="85" class="line-orange" stroke-dasharray="5,5"/>

  <!-- Explanation text -->
  <text x="25" y="185" class="text-light" font-size="10">≥15 strong votes on B₇ → Strong QC → LIB advances</text>
  <text x="25" y="200" class="text-light" font-size="10">Mixed strong+weak → Weak QC → high_qc advances</text>
  <text x="25" y="215" class="text-light" font-size="10">After B₈ with Strong QC → 2-chain rule → LIB = B₇</text>

  <!-- Vote Type Decision Panel -->
  <rect x="355" y="30" width="375" height="195" class="box-white"/>
  <text x="542" y="52" class="text-dark" font-size="13" text-anchor="middle" font-weight="bold">Vote Type Decision</text>

  <!-- Strong Vote -->
  <rect x="370" y="68" width="18" height="18" fill="#14532d" stroke="#4ade80" stroke-width="2" rx="3"/>
  <text x="398" y="80" class="text-dark" font-size="11" font-weight="bold" fill="#16a34a">Strong Vote</text>
  <text x="398" y="94" class="text-dark" font-size="9">liveness check passes AND QC timestamp ≥ last_vote</text>

  <!-- Weak Vote -->
  <rect x="370" y="118" width="18" height="18" fill="#7c2d12" stroke="#fb923c" stroke-width="2" rx="3"/>
  <text x="398" y="130" class="text-dark" font-size="11" font-weight="bold" fill="#ea580c">Weak Vote</text>
  <text x="398" y="144" class="text-dark" font-size="8">(always on a new, later block)</text>
  <text x="398" y="158" class="text-dark" font-size="9">liveness passes but QC hasn't caught up past last_vote,</text>
  <text x="398" y="172" class="text-dark" font-size="9">OR liveness fails but block extends lock</text>

  <!-- Caption -->
  <text x="375" y="300" class="caption" font-size="10" text-anchor="middle">FIGURE 5 — STRONG VS. WEAK VOTES DURING CHAIN FORK RECOVERY</text>
</svg>
