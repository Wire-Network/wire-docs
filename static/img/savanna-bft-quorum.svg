<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <style>
      /* Dark mode (default) */
      .bg { fill: #1a1d23; }
      .text-light { fill: #e0e0e0; font-family: 'JetBrains Mono', monospace; }
      .text-green { fill: #4ade80; font-family: 'JetBrains Mono', monospace; }
      .text-red { fill: #f87171; font-family: 'JetBrains Mono', monospace; }
      .text-cyan { fill: #67e8f9; font-family: 'JetBrains Mono', monospace; }
      .node-honest { fill: #14532d; stroke: #4ade80; stroke-width: 2; }
      .node-faulty { fill: #7f1d1d; stroke: #f87171; stroke-width: 2; }
      .caption { fill: #9ca3af; font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; }
      .divider { stroke: #6b7280; }

      /* Light mode */
      @media (prefers-color-scheme: light) {
        .bg { fill: #f6f8fa; }
        .text-light { fill: #1a1d23; }
        .text-green { fill: #16a34a; }
        .text-red { fill: #dc2626; }
        .text-cyan { fill: #0891b2; }
        .node-honest { fill: #dcfce7; stroke: #16a34a; }
        .node-faulty { fill: #fee2e2; stroke: #dc2626; }
        .caption { fill: #6b7280; }
        .divider { stroke: #9ca3af; }
      }
    </style>
  </defs>

  <rect class="bg" width="900" height="280"/>

  <!-- Title -->
  <text x="450" y="35" class="text-light" font-size="16" text-anchor="middle" font-weight="bold">BFT Quorum Requirement: n ≥ 3f + 1</text>
  <text x="450" y="55" class="text-light" font-size="12" text-anchor="middle">For 21 finalizers: tolerates up to 6 faulty (f=6), requires 15 honest for quorum</text>

  <!-- 21 Finalizer nodes - first row (11) -->
  <g transform="translate(70, 90)">
    <!-- Honest nodes (15 total - 11 in first row) -->
    <circle cx="0" cy="0" r="22" class="node-honest"/>
    <text x="0" y="5" class="text-green" font-size="10" text-anchor="middle">F1</text>

    <circle cx="70" cy="0" r="22" class="node-honest"/>
    <text x="70" y="5" class="text-green" font-size="10" text-anchor="middle">F2</text>

    <circle cx="140" cy="0" r="22" class="node-honest"/>
    <text x="140" y="5" class="text-green" font-size="10" text-anchor="middle">F3</text>

    <circle cx="210" cy="0" r="22" class="node-honest"/>
    <text x="210" y="5" class="text-green" font-size="10" text-anchor="middle">F4</text>

    <circle cx="280" cy="0" r="22" class="node-honest"/>
    <text x="280" y="5" class="text-green" font-size="10" text-anchor="middle">F5</text>

    <circle cx="350" cy="0" r="22" class="node-honest"/>
    <text x="350" y="5" class="text-green" font-size="10" text-anchor="middle">F6</text>

    <circle cx="420" cy="0" r="22" class="node-honest"/>
    <text x="420" y="5" class="text-green" font-size="10" text-anchor="middle">F7</text>

    <circle cx="490" cy="0" r="22" class="node-honest"/>
    <text x="490" y="5" class="text-green" font-size="10" text-anchor="middle">F8</text>

    <circle cx="560" cy="0" r="22" class="node-honest"/>
    <text x="560" y="5" class="text-green" font-size="10" text-anchor="middle">F9</text>

    <circle cx="630" cy="0" r="22" class="node-honest"/>
    <text x="630" y="5" class="text-green" font-size="10" text-anchor="middle">F10</text>

    <circle cx="700" cy="0" r="22" class="node-honest"/>
    <text x="700" y="5" class="text-green" font-size="10" text-anchor="middle">F11</text>
  </g>

  <!-- Second row (10 nodes: 4 honest + 6 faulty) -->
  <g transform="translate(105, 160)">
    <!-- Remaining honest nodes (4) -->
    <circle cx="0" cy="0" r="22" class="node-honest"/>
    <text x="0" y="5" class="text-green" font-size="10" text-anchor="middle">F12</text>

    <circle cx="70" cy="0" r="22" class="node-honest"/>
    <text x="70" y="5" class="text-green" font-size="10" text-anchor="middle">F13</text>

    <circle cx="140" cy="0" r="22" class="node-honest"/>
    <text x="140" y="5" class="text-green" font-size="10" text-anchor="middle">F14</text>

    <circle cx="210" cy="0" r="22" class="node-honest"/>
    <text x="210" y="5" class="text-green" font-size="10" text-anchor="middle">F15</text>

    <!-- Divider -->
    <line x1="262" y1="-30" x2="262" y2="30" class="divider" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Faulty nodes (6) -->
    <circle cx="315" cy="0" r="22" class="node-faulty"/>
    <text x="315" y="5" class="text-red" font-size="10" text-anchor="middle">F16</text>

    <circle cx="385" cy="0" r="22" class="node-faulty"/>
    <text x="385" y="5" class="text-red" font-size="10" text-anchor="middle">F17</text>

    <circle cx="455" cy="0" r="22" class="node-faulty"/>
    <text x="455" y="5" class="text-red" font-size="10" text-anchor="middle">F18</text>

    <circle cx="525" cy="0" r="22" class="node-faulty"/>
    <text x="525" y="5" class="text-red" font-size="10" text-anchor="middle">F19</text>

    <circle cx="595" cy="0" r="22" class="node-faulty"/>
    <text x="595" y="5" class="text-red" font-size="10" text-anchor="middle">F20</text>

    <circle cx="665" cy="0" r="22" class="node-faulty"/>
    <text x="665" y="5" class="text-red" font-size="10" text-anchor="middle">F21</text>
  </g>

  <!-- Legend -->
  <g transform="translate(70, 220)">
    <circle cx="10" cy="0" r="10" class="node-honest"/>
    <text x="30" y="5" class="text-light" font-size="11">Honest (quorum = 15)</text>

    <circle cx="220" cy="0" r="10" class="node-faulty"/>
    <text x="240" y="5" class="text-light" font-size="11">Byzantine (max = 6)</text>

    <text x="480" y="5" class="text-cyan" font-size="11">⌈2/3 × 21⌉ = 15 votes required for QC</text>
  </g>

  <!-- Caption -->
  <text x="450" y="265" class="caption" font-size="12" text-anchor="middle">FIGURE 2 — BFT QUORUM FOR 21 FINALIZERS: 15 OF 21 REQUIRED</text>
</svg>
